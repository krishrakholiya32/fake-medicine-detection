services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pillcheck
      POSTGRES_PASSWORD: pillcheck
      POSTGRES_DB: pillcheck
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pillcheck"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pillcheck:pillcheck@db:5432/pillcheck
      MODELS_PATH: /app/models
      ALLOWED_ORIGINS: '["http://localhost", "http://localhost:3002", "http://${SERVER_IP:-localhost}"]'
      MATCH_CONFIDENCE_THRESHOLD: "${MATCH_CONFIDENCE_THRESHOLD:-0.5}"
    volumes:
      - ./models:/app/models   # trained .onnx + labels.json live here
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          cpus: '${BACKEND_CPU_LIMIT:-1}'
          memory: ${BACKEND_MEM_LIMIT:-2G}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3002:80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
